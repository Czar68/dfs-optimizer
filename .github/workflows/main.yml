# Verify + Deploy pipeline. Runs on push to main or manual trigger. Deploy runs only on push to main after verify passes.
#
# CI enforcement (Phase 26): the verify job runs `npm run verify:canonical` — breakeven + canonical-samples drift +
# full Jest sweep listed in package.json + Playwright canonical-samples UI smoke. Expect ~3–8 minutes on ubuntu-latest.
# No separate “fast” subset in this workflow; local operators can run individual scripts (e.g. verify:canonical-samples).
#
# Phase 31 — Playwright UI smoke (last step of verify:canonical): GitHub sets CI=true, so Playwright does not reuse an
# existing vite preview (see playwright.config.ts). Preview port defaults to 4173 (playwright.preview.port.ts); the
# verify step sets PLAYWRIGHT_PREVIEW_PORT explicitly so the workflow file states the port. Local runs omit CI and may reuse.
name: Main
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: cd web-dashboard && npm ci
      - run: npx playwright install --with-deps chromium
      - name: Full canonical verification (npm run verify:canonical)
        env:
          PLAYWRIGHT_PREVIEW_PORT: "4173"
        run: npm run verify:canonical
      - name: Check table invariant (grep)
        run: grep -q "UD_2P_STD.*53.45" artifacts/parlay_breakeven_table.md

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Build backend (dist/)
        run: npx tsc -p .

      - name: Setup web-dashboard
        run: |
          cd web-dashboard && npm ci

      - name: Build web-dashboard (web-dashboard/dist/)
        run: |
          cd web-dashboard && npm run build

      - name: Debug SFTP secrets (lengths only, no values)
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          echo "SFTP_SERVER length: ${#SFTP_SERVER}"
          echo "SFTP_USERNAME length: ${#SFTP_USERNAME}"
          echo "SFTP_PASSWORD length: ${#SFTP_PASSWORD} (value masked)"
          if [ -n "$SFTP_SERVER" ]; then
            printf 'SFTP_SERVER first char code: %d, last char code: %d\n' "'${SFTP_SERVER:0:1}" "'${SFTP_SERVER: -1}"
          fi
          if [ -n "$SFTP_USERNAME" ]; then
            printf 'SFTP_USERNAME first char code: %d, last char code: %d\n' "'${SFTP_USERNAME:0:1}" "'${SFTP_USERNAME: -1}"
          fi

      - name: Deploy to server (SFTP)
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: node scripts/deploy-sftp-gh.js
