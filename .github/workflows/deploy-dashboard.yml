# Deploy dashboard to IONOS (SFTP) after build.
# Trigger: push to main, or "Run workflow" from Actions tab.
# Secrets: FTP_SERVER or SFTP_SERVER, FTP_USERNAME, FTP_PASSWORD.

name: Deploy Dashboard
on:
  push:
    branches: [main]
    paths:
      - 'web-dashboard/**'
      - 'scripts/deploy-ftp.js'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Deploy to IONOS (SFTP)
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: npm run deploy:ftp
